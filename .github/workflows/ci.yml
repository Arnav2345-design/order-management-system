name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: order_management_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        env:
          PGPASSWORD: postgres
        run: |
          for f in src/migrations/*.sql; do
            psql -h localhost -U postgres -d order_management_test -f "$f"
          done

      - name: Run tests
        env:
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: order_management_test
          JWT_SECRET: test-secret-key-minimum-32-characters-long
          JWT_EXPIRES_IN: 7d
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          RAZORPAY_KEY_ID: test_key_id
          RAZORPAY_KEY_SECRET: test_key_secret
          RAZORPAY_WEBHOOK_SECRET: test_webhook_secret
          CORS_ORIGIN: http://localhost:3000
        run: npm test
